# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank # the website title (if blank, full name will be used instead)
first_name: Kento
middle_name:
last_name: Nozawa
email: k_nzw@klis.tsukuba.ac.jp
description: > # the ">" symbol means to ignore newlines until "footer_text:"
  Kento Nozawa's personal page
footer_text: >
  Powered by <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

# url:  # the base hostname & protocol for your site
# baseurl: /al-folio # the subpath of your site, e.g. /blog/
last_updated: false # set to true if you want to display last updated in the footer

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true

# Dimensions
max_width: 1024px

# TODO: add layout settings (single page vs. multi-page)

# -----------------------------------------------------------------------------
# Open Graph
# -----------------------------------------------------------------------------
# Display links to the page with a preview object on social media.
serve_og_meta: false # Include Open Graph meta tags in the HTML head
og_image: # The site-wide (default for all links) Open Graph preview image

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------
github_username: nzw0301 # your GitHub user name
twitter_username: nzw0301 # your Twitter handle
linkedin_username: nozawa-kento-0301 # your LinkedIn user name
scholar_userid: DSdjj8AAAAAJ # your Google Scholar ID
facebook_username: knt.nzw
youtube_username: UC2oHHAcwIZpmvs003guto_A
orcid_id: 0000-0002-7468-9897
medium_username: # your Medium username
quora_username: # your Quora username
publons_id: # your ID on Publons
research_gate_profile: # your profile on ResearchGate
blogger_url: # your blogger URL
semantic_id: Kento-Nozawa/13613520  # https://www.semanticscholar.org/author/
stackoverflow_id: 2406562/nzw0301  # https://stackoverflow.com/users/
dblp_id: 215/4422  # https://dblp.org/pid/
speakerdeck_username: nzw0301

google_analytics: UA-56934733-2
#

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

# blog_name: al-folio  # your blog must have a name for it to show up in the nav bar
blog_description: Notes
permalink: /:year/:month/:title

# Pagination
pagination:
  enabled: true

# Comments
# disqus_shortname: al-folio # put your disqus shortname

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/

news_limit: 7

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# Markdown and syntax highlight
markdown: kramdown
highlighter: rouge
highlight_theme: github  # https://github.com/jwarby/jekyll-pygments-themes
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

livereload: true # You no longer need to include --livereload
timezone: JPN
future: true

# Includes & excludes
include: ['_pages']
exclude:
  - CNAME
  - Gemfile
  - README.md
  - .gitignore
  - .sass-cache
  - Gemfile.lock
  - LICENSE
  - vendor
  - node_modules
  - .jekyll-cache
  - .jekyll-metadata
  - bin
  - _bibliography
  - _data

# Plug-ins
plugins:
  - jekyll-email-protect
  - jekyll-github-metadata
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-twitter-plugin
  - jemoji
  - jekyll-include-cache
  - jekyll-redirect-from

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:

  last_name: Nozawa
  first_name: [Kento]

  style: elsevier-harvard
  locale: en

  sort_by: year
  order: descending

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics:  true
enable_mansory:           true
enable_math:              true
enable_tooltips:          false
enable_darkmode:          true
show_social_icons:        true

