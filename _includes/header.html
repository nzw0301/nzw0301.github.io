<header>

    <!-- Nav Bar -->
    <nav id="navbar" class="navbar navbar-light navbar-expand-sm {% if site.navbar_fixed %}fixed-top{% else %}sticky-top{% endif %}">
    <div class="container">
      {% if page.title != "about" %}
      <a class="navbar-brand title font-weight-lighter" href="{{ site.baseurl | prepend: site.url }}/">
        {% if site.title == blank %}{{ site.title }}{% else %}<span class="font-weight-bold">{{ site.first_name }}</span> {{ site.middle_name }}  {{ site.last_name }}{% endif %}
      </a>
      {% elsif site.show_social_icons %}
        <!-- Social Icons -->
        <div class="row ml-1 ml-sm-0">
          {% include social.html %}
        </div>
      {% endif %}
      <!-- Navbar Toogle -->
      <button class="navbar-toggler collapsed ml-auto" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar top-bar"></span>
        <span class="icon-bar middle-bar"></span>
        <span class="icon-bar bottom-bar"></span>
      </button>
      <div class="collapse navbar-collapse text-right" id="navbarNav">
        <ul class="navbar-nav ml-auto flex-nowrap">

          <!-- About -->
          <!-- <li class="nav-item {% if page.title == 'About' %}active{% endif %}">
            <a class="nav-link" href="{{ '/' | relative_url }}">
              About
              {% if page.title == "about" %}
                <span class="sr-only">(current)</span>
              {% endif %}
            </a>
          </li> -->

          <!-- Blog -->
          <!-- <li class="nav-item {% if page.url contains 'blog' %}active{% endif %}">
            <a class="nav-link" href="{{ '/blog/' | relative_url }}">
              blog
              {% if page.title == "blog" %}
              <span class="sr-only">(current)</span>
              {% endif %}
            </a>
          </li> -->

          <!-- Publication -->
          <!-- <li class="nav-item {% if page.url contains 'publication' %}active{% endif %}">
            <a class="nav-link" href="{{ '/publications/' | prepend: site.url }}">
              Publication
              {% if page.title == "publication" %}
              <span class="sr-only">(current)</span>
              {% endif %}
            </a>
          </li> -->

          <!-- CV -->
          <li class="nav-item">
            <a class="nav-link" href="https://www.dropbox.com/s/lezvs3qqk3f7irf/kento_nozawa_cv.pdf?dl=0">
              CV
            </a>
          </li>

          {% if site.enable_darkmode %}
            <div class = "toggle-container">
              <a id = "light-toggle">
                  <i class="fas fa-moon"></i>
                  <i class="fas fa-sun"></i>
              </a>
            </div>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
</header>
